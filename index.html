<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ruleta de Luis</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #121212;
    color: white;
    text-align: center;
}

h1 {
    margin-top: 20px;
}

/* INPUT */
textarea {
    width: 90%;
    height: 80px;
    border-radius: 10px;
    padding: 10px;
    margin: 10px 0;
}

/* BOTONES */
button {
    padding: 10px 20px;
    margin: 5px;
    border: none;
    border-radius: 10px;
    background: #00c853;
    color: white;
    font-size: 16px;
    cursor: pointer;
}

/* RULETA */
.ruleta-container {
    position: relative;
    margin: 20px auto;
    width: 300px;
    height: 300px;
}

canvas {
    border-radius: 50%;
    transition: transform 4s cubic-bezier(0.33, 1, 0.68, 1);
}

/* FLECHA */
.flecha {
    position: absolute;
    top: -10px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 30px;
}
</style>
</head>

<body>

<h1>🎡 Ruleta de Luis</h1>

<textarea id="nombres" placeholder="Ejemplo:
Luis, Ana, Pedro, Karol"></textarea><br>

<button onclick="crearRuleta()">Cargar nombres</button>
<button onclick="girar()">Girar</button>

<div class="ruleta-container">
    <div class="flecha">⬇️</div>
    <canvas id="canvas" width="300" height="300"></canvas>
</div>

<h2 id="resultado"></h2>

<script>
let opciones = [];
let anguloActual = 0;

function crearRuleta() {
    let input = document.getElementById("nombres").value;
    opciones = input.split(",").map(x => x.trim()).filter(x => x !== "");
    dibujarRuleta();
}

function dibujarRuleta() {
    let canvas = document.getElementById("canvas");
    let ctx = canvas.getContext("2d");

    ctx.clearRect(0, 0, 300, 300);

    let total = opciones.length;
    let angulo = (2 * Math.PI) / total;

    for (let i = 0; i < total; i++) {
        ctx.beginPath();
        ctx.moveTo(150,150);
        ctx.arc(150,150,150, i * angulo, (i + 1) * angulo);
        ctx.fillStyle = i % 2 === 0 ? "#ff6384" : "#36a2eb";
        ctx.fill();

        ctx.save();
        ctx.translate(150,150);
        ctx.rotate(i * angulo + angulo/2);
        ctx.fillStyle = "white";
        ctx.font = "14px Arial";
        ctx.fillText(opciones[i], 60, 5);
        ctx.restore();
    }
}

function girar() {
    if (opciones.length === 0) {
        alert("Ingresa nombres");
        return;
    }

    let canvas = document.getElementById("canvas");

    let giro = Math.floor(Math.random() * 360) + 1080; // 3 vueltas mínimo
    anguloActual += giro;

    canvas.style.transform = `rotate(${anguloActual}deg)`;

    setTimeout(() => {
        let total = opciones.length;
        let grados = anguloActual % 360;
        let anguloPorOpcion = 360 / total;

        let index = Math.floor((360 - grados) / anguloPorOpcion) % total;

        document.getElementById("resultado").innerText =
            "🎉 Ganador: " + opciones[index];
    }, 4000);
}
</script>

</body>
</html>
