<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>El Viaje de Ashley</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }

  body {
    background-color: #87CEEB; /* Cielo azul */
    font-family: 'Press Start 2P', cursive;
    overflow: hidden;
    touch-action: none; /* Evita que la pantalla se mueva en el celular */
  }

  canvas {
    display: block;
    width: 100vw;
    height: 100vh;
  }

  /* Controles Táctiles para celular */
  #controls {
    position: absolute;
    bottom: 20px;
    left: 0;
    width: 100%;
    display: flex;
    justify-content: space-between;
    padding: 0 20px;
    pointer-events: none;
  }

  .btn-group {
    display: flex;
    gap: 15px;
    pointer-events: auto;
  }

  .btn {
    width: 60px;
    height: 60px;
    background: rgba(255, 255, 255, 0.5);
    border: 3px solid white;
    border-radius: 50%;
    font-size: 24px;
    font-weight: bold;
    color: #ff1493;
    display: flex;
    justify-content: center;
    align-items: center;
    box-shadow: 0 4px 0 rgba(0,0,0,0.2);
  }

  .btn:active {
    transform: translateY(4px);
    box-shadow: none;
    background: rgba(255, 105, 180, 0.7);
    color: white;
  }

  /* Ventana Modal para los Mensajes */
  #modal {
    display: none;
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.6);
    justify-content: center;
    align-items: center;
    z-index: 10;
  }

  .modal-content {
    background: #fff0f5;
    border: 4px solid #ff1493;
    border-radius: 15px;
    padding: 25px;
    text-align: center;
    width: 85%;
    max-width: 400px;
    box-shadow: 0 0 20px rgba(255, 20, 147, 0.6);
  }

  .modal-content h2 {
    color: #ff1493;
    font-size: 14px;
    margin-bottom: 20px;
    line-height: 1.5;
  }

  .modal-btn {
    background: #ff1493;
    color: white;
    border: none;
    padding: 15px 20px;
    font-family: inherit;
    font-size: 12px;
    border-radius: 10px;
    box-shadow: 0 4px 0 #c71585;
  }
  .modal-btn:active {
    transform: translateY(4px);
    box-shadow: none;
  }
</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div id="controls">
  <div class="btn-group">
    <div class="btn" id="btnLeft">◄</div>
    <div class="btn" id="btnRight">►</div>
  </div>
  <div class="btn-group">
    <div class="btn" id="btnJump">▲</div>
  </div>
</div>

<div id="modal">
  <div class="modal-content">
    <h2 id="modalText">Mensaje</h2>
    <button class="modal-btn" onclick="resumeGame()" id="btnContinuar">Continuar ♥</button>
  </div>
</div>

<script>
// --- MENSAJES DE LUIS PARA ASHLEY ---
const frasesMotivacionales = [
  "Ashley, hoy el sol brilla un poquito más para ti",
  "Eres una luz hermosa, aunque a veces no lo notes",
  "Mira qué lejos has llegado, ¡estoy orgulloso de ti!",
  "Tienes un corazón increíble y eso se siente",
  "Cada día eres un poco más fuerte y radiante",
  "El mundo es más bonito porque tú estás en él",
  "Respira profundo… todo está saliendo bien",
  "Tus sonrisas hacen el día de alguien más especial",
  "Ashley, mereces todo lo bueno que viene para ti",
  "Eres capaz de crear momentos mágicos",
  "Dentro de ti hay una fuerza suave pero imparable",
  "Hoy es un buen día para recordarte lo valiosa que eres",
  "Estás exactamente donde necesitas estar ahora",
  "Tu energía es cálida y el mundo la necesita",
  "Ashley, todo va a florecer cuando sea el momento perfecto"
];

// Mezclar los mensajes aleatoriamente
let mensajesMezclados = [...frasesMotivacionales].sort(() => Math.random() - 0.5);

// --- CONFIGURACIÓN DEL JUEGO ---
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let scale = 1;
let tileSize = 40;
let cameraX = 0;
let isPaused = false;
let gameWon = false;

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

// --- SISTEMA DE PIXEL ART POR CÓDIGO ---
const colorMap = {
  ' ': 'transparent',
  'Y': '#FFD700', // Dorado/Rubio
  'F': '#FFC3A0', // Piel
  'P': '#FF69B4', // Rosa (Princesa)
  'K': '#000000', // Negro (Ojos)
  'G': '#32CD32', // Verde (Cupa)
  'B': '#8B4513', // Marrón (Monito)
  'W': '#FFFFFF', // Blanco
  'R': '#FF0000', // Rojo
  'C': '#A9A9A9', // Gris (Castillo)
  'D': '#696969'  // Gris oscuro
};

const sprites = {
  princesa: [
    "  Y  Y  ",
    " YYYYYY ",
    "  FFFF  ",
    " F K KF ",
    "  PPPP  ",
    " PPPPPP ",
    " P PP P ",
    " K    K "
  ],
  estrella: [
    "   Y    ",
    "  YYY   ",
    " YYYYY  ",
    "YYYYYYY ",
    " YYYYY  ",
    "  Y Y   ",
    " Y   Y  ",
    "        "
  ],
  monito: [
    "  BBB   ",
    " B B B  ",
    "  FFF   ",
    " F K KF ",
    "  BBB   ",
    " BBBBBB ",
    " B BB B ",
    " B    B "
  ],
  cupa: [
    "  GGG   ",
    " GGGGG  ",
    "YGGGGGY ",
    "  FFF   ",
    " F K KF ",
    "  GGG   ",
    " G GG G ",
    " W    W "
  ],
  bloque: [
    "RRRRRRRR",
    "RWWWWWRR",
    "RWRRRWRR",
    "RWRRRWRR",
    "RWRRRWRR",
    "RWWWWWRR",
    "RRRRRRRR",
    "RRRRRRRR"
  ]
};

function drawSprite(spriteName, x, y, width, height) {
  const sprite = sprites[spriteName];
  if(!sprite) return;
  const pW = width / 8;
  const pH = height / 8;
  for (let row = 0; row < 8; row++) {
    for (let col = 0; col < 8; col++) {
      const char = sprite[row][col];
      if (char !== ' ') {
        ctx.fillStyle = colorMap[char];
        ctx.fillRect(x + col * pW, y + row * pH, pW + 1, pH + 1); // +1 evita líneas vacías
      }
    }
  }
}

function drawCastle(x, y, w, h) {
  ctx.fillStyle = colorMap['C'];
  ctx.fillRect(x, y + h/2, w, h/2);
  ctx.fillRect(x, y, w/3, h/2);
  ctx.fillRect(x + w - w/3, y, w/3, h/2);
  ctx.fillStyle = colorMap['D'];
  ctx.fillRect(x + w/2 - 10, y + h - 30, 20, 30); // Puerta
}

// --- ENTIDADES DEL JUEGO ---
let player = {
  x: 50, y: 100, w: 32, h: 32,
  vx: 0, vy: 0, speed: 4, jumpPower: -12,
  grounded: false, stars: 0
};

let blocks = [];
let items = []; // Monitos y Estrellas
let enemies = []; // Cupas
let castle = { x: 0, y: 0, w: 120, h: 120 };

// Teclas
const keys = { left: false, right: false, jump: false };

// --- MAPA DEL NIVEL ---
// P = Princesa, X = Bloque, * = Estrella, M = Monito, E = Cupa, C = Castillo
const mapDesign = [
  "                                                                               ",
  "                                                                               ",
  "                                                                               ",
  "                                                                               ",
  "                                                                               ",
  "                                      * M                               ",
  "                                     XXXX     XXXX                 C           ",
  "                        M                                  * ",
  "             * XXXXX                        E      XXXXX                ",
  "P           XXX                            XXXXXXXXXXXX                        ",
  "XXXXXXXXXXXXXXXXX    XXXXXXXXX    XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX"
];

function loadMap() {
  blocks = []; items = []; enemies = [];
  for (let r = 0; r < mapDesign.length; r++) {
    for (let c = 0; c < mapDesign[r].length; c++) {
      let char = mapDesign[r][c];
      let x = c * tileSize;
      let y = r * tileSize + (window.innerHeight / 2 - 150); // Centrar verticalmente
      
      if (char === 'X') blocks.push({ x: x, y: y, w: tileSize, h: tileSize });
      if (char === 'P') { player.x = x; player.y = y; }
      if (char === '*') items.push({ type: 'estrella', x: x+8, y: y+8, w: 24, h: 24 });
      if (char === 'M') items.push({ type: 'monito', x: x+4, y: y+8, w: 32, h: 32 });
      if (char === 'E') enemies.push({ x: x, y: y+8, w: 32, h: 32, vx: 2, dir: 1 });
      if (char === 'C') { castle.x = x; castle.y = y - 80; } // Castillo más alto
    }
  }
}

// --- CONTROLES MÓVILES Y TECLADO ---
window.addEventListener("keydown", (e) => {
  if(e.key==="ArrowLeft" || e.key==="a") keys.left=true;
  if(e.key==="ArrowRight" || e.key==="d") keys.right=true;
  if(e.key==="ArrowUp" || e.key==="w" || e.key===" ") keys.jump=true;
});
window.addEventListener("keyup", (e) => {
  if(e.key==="ArrowLeft" || e.key==="a") keys.left=false;
  if(e.key==="ArrowRight" || e.key==="d") keys.right=false;
  if(e.key==="ArrowUp" || e.key==="w" || e.key===" ") keys.jump=false;
});

// Botones en pantalla
function addTouch(id, key) {
  const btn = document.getElementById(id);
  btn.addEventListener("touchstart", (e) => { e.preventDefault(); keys[key] = true; });
  btn.addEventListener("touchend", (e) => { e.preventDefault(); keys[key] = false; });
}
addTouch("btnLeft", "left");
addTouch("btnRight", "right");
addTouch("btnJump", "jump");

// --- COLISIONES ---
function checkCollision(r1, r2) {
  return r1.x < r2.x + r2.w && r1.x + r1.w > r2.x &&
         r1.y < r2.y + r2.h && r1.y + r1.h > r2.y;
}

// --- LÓGICA DEL JUEGO ---
function update() {
  if (isPaused || gameWon) return;

  // Movimiento Jugador X
  if (keys.left) player.vx = -player.speed;
  else if (keys.right) player.vx = player.speed;
  else player.vx = 0;

  player.x += player.vx;
  // Colisión X con bloques
  for (let b of blocks) {
    if (checkCollision(player, b)) {
      if (player.vx > 0) player.x = b.x - player.w;
      if (player.vx < 0) player.x = b.x + b.w;
    }
  }

  // Gravedad y Salto
  player.vy += 0.6; // Gravedad
  if (keys.jump && player.grounded) {
    player.vy = player.jumpPower;
    player.grounded = false;
  }

  player.y += player.vy;
  player.grounded = false;
  // Colisión Y con bloques
  for (let b of blocks) {
    if (checkCollision(player, b)) {
      if (player.vy > 0) { // Cae sobre bloque
        player.y = b.y - player.h;
        player.vy = 0;
        player.grounded = true;
      } else if (player.vy < 0) { // Golpea cabeza
        player.y = b.y + b.h;
        player.vy = 0;
      }
    }
  }

  // Caer al vacío (Reiniciar)
  if (player.y > canvas.height + 100) loadMap();

  // Actualizar Enemigos
  for (let e of enemies) {
    e.x += e.vx;
    let hitBlock = false;
    for (let b of blocks) {
      if (checkCollision(e, b)) hitBlock = true;
    }
    // Si choca, cambia de dirección
    if (hitBlock) {
      e.vx *= -1;
      e.x += e.vx * 2;
    }
    
    // Colisión Jugador - Cupa (Si no lo pisa desde arriba, muere)
    if (checkCollision(player, e)) {
      if (player.vy > 0 && player.y < e.y + 10) {
        // Mata al enemigo
        e.muerto = true;
        player.vy = -8; // Rebote
      } else {
        // Muere el jugador
        loadMap();
      }
    }
  }
  enemies = enemies.filter(e => !e.muerto);

  // Recolectar Items (Monitos y Estrellas)
  for (let i = 0; i < items.length; i++) {
    if (checkCollision(player, items[i])) {
      if (items[i].type === 'estrella') {
        player.stars++;
      } else if (items[i].type === 'monito') {
        mostrarMensaje();
      }
      items.splice(i, 1);
      i--;
    }
  }

  // Llegar al Castillo (Ganar)
  if (checkCollision(player, castle)) {
    gameWon = true;
    mostrarGanaste();
  }

  // Cámara sigue al jugador
  cameraX = player.x - canvas.width / 2.5;
}

function mostrarMensaje() {
  isPaused = true;
  const modal = document.getElementById("modal");
  const modalText = document.getElementById("modalText");
  
  // Tomar un mensaje aleatorio
  if (mensajesMezclados.length === 0) {
    mensajesMezclados = [...frasesMotivacionales].sort(() => Math.random() - 0.5);
  }
  modalText.innerText = mensajesMezclados.pop();
  modal.style.display = "flex";
}

function mostrarGanaste() {
  isPaused = true;
  const modal = document.getElementById("modal");
  const modalText = document.getElementById("modalText");
  const btn = document.getElementById("btnContinuar");
  
  modalText.innerText = "¡Felicidades Ashley!\n\nLlegaste al final del camino.\nNunca olvides lo especial que eres. \nCon amor, tu creador Luis. ♥";
  btn.innerText = "Volver a jugar";
  btn.onclick = () => { location.reload(); };
  modal.style.display = "flex";
}

window.resumeGame = function() {
  document.getElementById("modal").style.display = "none";
  // Pequeño timeout para evitar saltos raros al quitar la pausa
  setTimeout(() => { isPaused = false; }, 100);
}

// --- DIBUJAR ---
function draw() {
  // Fondo
  ctx.fillStyle = "#87CEEB";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.save();
  ctx.translate(-cameraX, 0);

  // Bloques
  for (let b of blocks) drawSprite('bloque', b.x, b.y, b.w, b.h);
  
  // Castillo
  drawCastle(castle.x, castle.y, castle.w, castle.h);

  // Items
  for (let item of items) drawSprite(item.type, item.x, item.y, item.w, item.h);

  // Enemigos
  for (let e of enemies) drawSprite('cupa', e.x, e.y, e.w, e.h);

  // Jugador
  drawSprite('princesa', player.x, player.y, player.w, player.h);

  ctx.restore();

  // UI (Estrellas)
  ctx.fillStyle = "white";
  ctx.font = "16px 'Press Start 2P'";
  ctx.fillText("Estrellas: " + player.stars, 20, 40);
}

// --- BUCLE PRINCIPAL ---
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

// Iniciar
loadMap();
loop();
</script>

</body>
</html>
