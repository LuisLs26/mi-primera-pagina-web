<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mario Bros Funcional</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87CEEB; }
        canvas { display: block; background: #87CEEB; margin: 0 auto; }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<script>
// Setup del Canvas
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// Configuración inicial
let mario = { x: 50, y: canvas.height - 150, width: 50, height: 70, speed: 5, dx: 0, dy: 0, gravity: 0.8, jumpPower: -15, jumping: false };
let floorHeight = 50;
let keys = { left: false, right: false, up: false };

// Fondo
let backgroundColor = "#87CEEB"; // Color cielo

// Movimiento y gravedad de Mario
function moveMario() {
    if (keys.left && mario.x > 0) {
        mario.dx = -mario.speed;
    } else if (keys.right && mario.x < canvas.width - mario.width) {
        mario.dx = mario.speed;
    } else {
        mario.dx = 0;
    }

    if (keys.up && !mario.jumping) {
        mario.dy = mario.jumpPower;
        mario.jumping = true;
    }

    mario.x += mario.dx;
    mario.y += mario.dy;

    if (mario.y + mario.height > canvas.height - floorHeight) {
        mario.y = canvas.height - mario.height - floorHeight;
        mario.dy = 0;
        mario.jumping = false;
    } else {
        mario.dy += mario.gravity; // Aplicamos gravedad
    }
}

// Dibujar Mario
function drawMario() {
    ctx.fillStyle = "red";
    ctx.fillRect(mario.x, mario.y, mario.width, mario.height);
}

// Función para dibujar el suelo
function drawFloor() {
    ctx.fillStyle = "green";
    ctx.fillRect(0, canvas.height - floorHeight, canvas.width, floorHeight);
}

// Control de teclas
function keyDown(e) {
    if (e.key == "ArrowLeft" || e.key == "a") {
        keys.left = true;
    }
    if (e.key == "ArrowRight" || e.key == "d") {
        keys.right = true;
    }
    if (e.key == "ArrowUp" || e.key == "w") {
        keys.up = true;
    }
}

function keyUp(e) {
    if (e.key == "ArrowLeft" || e.key == "a") {
        keys.left = false;
    }
    if (e.key == "ArrowRight" || e.key == "d") {
        keys.right = false;
    }
    if (e.key == "ArrowUp" || e.key == "w") {
        keys.up = false;
    }
}

// Función principal de actualización del juego
function update() {
    ctx.clearRect(0, 0, canvas.width, canvas.height); // Limpiar canvas
    moveMario();
    drawFloor();
    drawMario();
    requestAnimationFrame(update); // Llamar a la siguiente actualización
}

// Event listeners
window.addEventListener('keydown', keyDown);
window.addEventListener('keyup', keyUp);

// Empezar juego
update();
</script>

</body>
</html>
