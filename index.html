<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora de Luis</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #1e1e2f;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* CONTENEDOR */
.calculadora {
    width: 300px;
    background: #2c2c3e;
    padding: 20px;
    border-radius: 20px;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

/* TITULO */
h1 {
    color: white;
    text-align: center;
    font-size: 20px;
    margin-bottom: 10px;
}

/* PANTALLA */
.pantalla {
    width: 100%;
    height: 60px;
    background: black;
    color: #00ffcc;
    font-size: 24px;
    text-align: right;
    padding: 10px;
    border-radius: 10px;
    margin-bottom: 15px;
    box-sizing: border-box;
}

/* BOTONES */
.botones {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
}

button {
    padding: 15px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    background: #444;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #666;
}

/* BOTONES ESPECIALES */
.operador {
    background: #ff9500;
}

.igual {
    background: #00c853;
    grid-column: span 2;
}

.clear {
    background: #ff3b30;
}
</style>
</head>

<body>

<div class="calculadora">
    <h1>Calculadora de Luis</h1>

    <input type="text" id="pantalla" class="pantalla" disabled>

    <div class="botones">
        <button class="clear" onclick="limpiar()">C</button>
        <button onclick="borrar()">⌫</button>
        <button class="operador" onclick="agregar('/')">÷</button>
        <button class="operador" onclick="agregar('*')">×</button>

        <button onclick="agregar('7')">7</button>
        <button onclick="agregar('8')">8</button>
        <button onclick="agregar('9')">9</button>
        <button class="operador" onclick="agregar('-')">−</button>

        <button onclick="agregar('4')">4</button>
        <button onclick="agregar('5')">5</button>
        <button onclick="agregar('6')">6</button>
        <button class="operador" onclick="agregar('+')">+</button>

        <button onclick="agregar('1')">1</button>
        <button onclick="agregar('2')">2</button>
        <button onclick="agregar('3')">3</button>

        <button onclick="agregar('0')">0</button>
        <button onclick="agregar('.')">.</button>
        <button class="igual" onclick="calcular()">=</button>
    </div>
</div>

<script>
function agregar(valor) {
    document.getElementById("pantalla").value += valor;
}

function limpiar() {
    document.getElementById("pantalla").value = "";
}

function borrar() {
    let pantalla = document.getElementById("pantalla");
    pantalla.value = pantalla.value.slice(0, -1);
}

function calcular() {
    try {
        let resultado = eval(document.getElementById("pantalla").value);
        document.getElementById("pantalla").value = resultado;
    } catch {
        alert("Error");
    }
}
</script>

</body>
</html>
