<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FELIZ 1 DE ABRIL</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: linear-gradient(135deg, #ff4e50, #fc913a);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* TEXTO */
h1 {
    font-size: 50px;
    color: white;
    text-align: center;
    font-family: cursive;
    text-shadow: 0 0 20px rgba(255,255,255,0.8);
    animation: brillo 2s infinite alternate;
}

/* BRILLO */
@keyframes brillo {
    from { transform: scale(1); }
    to { transform: scale(1.1); }
}

/* ELEMENTOS FLOTANTES */
.particula {
    position: fixed;
    font-size: 25px;
    animation: caer linear forwards;
}

@keyframes caer {
    0% {
        transform: translateY(-50px);
        opacity: 1;
    }
    100% {
        transform: translateY(100vh);
        opacity: 0;
    }
}
</style>
</head>

<body>

<h1>🎉 FELIZ 1 DE ABRIL 🎉</h1>

<script>
function crearEfecto() {
    const emojis = ["🎉","🎊","💖","❤️","✨"];

    for (let i = 0; i < 30; i++) {
        let elem = document.createElement("div");
        elem.classList.add("particula");
        elem.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];

        elem.style.left = Math.random() * window.innerWidth + "px";
        elem.style.animationDuration = (Math.random() * 3 + 2) + "s";

        document.body.appendChild(elem);

        setTimeout(() => elem.remove(), 5000);
    }
}

/* Se activa al entrar */
window.onload = () => {
    setInterval(crearEfecto, 800);
};
</script>

</body>
</html>
