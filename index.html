<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CALCULADORA DE LUIS XD</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* CONTENEDOR */
.calculadora {
    width: 300px;
    background: #222;
    padding: 20px;
    border-radius: 20px;
    box-shadow: 0 0 20px black;
}

/* TITULO */
h1 {
    color: white;
    text-align: center;
    font-size: 18px;
}

/* PANTALLA */
.pantalla {
    width: 100%;
    height: 60px;
    background: black;
    color: #00ffcc;
    font-size: 24px;
    text-align: right;
    padding: 10px;
    border-radius: 10px;
    margin-bottom: 15px;
}

/* BOTONES */
.botones {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
}

button {
    padding: 15px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    background: #444;
    color: white;
    cursor: pointer;
}

.operador { background: #ff9500; }
.igual { background: #00c853; grid-column: span 2; }
.clear { background: #ff3b30; }
</style>
</head>

<body>

<div class="calculadora">
    <h1>CALCULADORA DE LUIS XD 😈</h1>

    <input type="text" id="pantalla" class="pantalla" disabled>

    <div class="botones">
        <button class="clear" onclick="limpiar()">C</button>
        <button onclick="borrar()">⌫</button>
        <button class="operador" onclick="agregar('/')">÷</button>
        <button class="operador" onclick="agregar('*')">×</button>

        <button onclick="agregar('7')">7</button>
        <button onclick="agregar('8')">8</button>
        <button onclick="agregar('9')">9</button>
        <button class="operador" onclick="agregar('-')">−</button>

        <button onclick="agregar('4')">4</button>
        <button onclick="agregar('5')">5</button>
        <button onclick="agregar('6')">6</button>
        <button class="operador" onclick="agregar('+')">+</button>

        <button onclick="agregar('1')">1</button>
        <button onclick="agregar('2')">2</button>
        <button onclick="agregar('3')">3</button>

        <button onclick="agregar('0')">0</button>
        <button onclick="agregar('.')">.</button>
        <button class="igual" onclick="calcular()">=</button>
    </div>
</div>

<script>
function agregar(valor) {
    document.getElementById("pantalla").value += valor;
}

function limpiar() {
    document.getElementById("pantalla").value = "";
}

function borrar() {
    let pantalla = document.getElementById("pantalla");
    pantalla.value = pantalla.value.slice(0, -1);
}

/* 😈 CALCULADORA TROLL AJUSTADA */
function calcular() {
    let pantalla = document.getElementById("pantalla");

    try {
        let correcto = eval(pantalla.value);

        let probabilidad = Math.random();

        let resultado;

        if (probabilidad < 0.8) {
            // 🔢 80% números incorrectos
            let error = Math.floor(Math.random() * 20 - 10);
            resultado = correcto + error;
        } else {
            // 💀 20% mensajes troll
            let mensajes = [
                "💀 ESTUDIA MÁS",
                "🤯 ???",
                "NO SE 😈",
                "ERROR 😂",
                "∞"
            ];
            resultado = mensajes[Math.floor(Math.random() * mensajes.length)];
        }

        pantalla.value = resultado;

        // 📳 Vibración (si es celular)
        if (navigator.vibrate) {
            navigator.vibrate(100);
        }

    } catch {
        pantalla.value = "💀 ERROR";
    }
}
</script>

</body>
</html>
